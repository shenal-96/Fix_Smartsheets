# Example secrets file for Streamlit deployment.
#
# DO NOT commit a real version of this file with your actual token.
# This is .gitignored — copy to .streamlit/secrets.toml and fill in
# values you want pre-loaded.
#
# In Streamlit Community Cloud, configure these via:
#   App settings → Secrets → paste the TOML below.
#
# ALL VALUES ARE OPTIONAL. If you skip them, the app will simply
# require you to enter them in the sidebar every session, which is
# the safer pattern for shared/public deployments.

# Default workspace ID. Pre-fills the sidebar field for first-time users.
# DEFAULT_WORKSPACE_ID = "1234567890123456"

# ------------------------------------------------------------------
# User accounts (each user signs in and uses their OWN API key)
# ------------------------------------------------------------------
# The app now requires a login. Each user supplies their own Smartsheet
# API token, which is encrypted at rest. Set the two keys below for a
# durable production deployment:
#
#   FERNET_KEY      - encryption key for stored API tokens. Generate once with:
#                       python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#                     Keep it STABLE -- if it changes, stored tokens can no
#                     longer be decrypted and users must re-enter their key.
#   AUTH_COOKIE_KEY - random string used to sign the login session cookie.
#
# FERNET_KEY = "paste_generated_fernet_key_here"
# AUTH_COOKIE_KEY = "some_long_random_string"
#
# NOTE: On Streamlit Community Cloud the filesystem is ephemeral, so the
# user database (.streamlit/users.db) is wiped on container restart. For
# durable accounts, point USER_DB_PATH at a mounted volume or use an
# external database.
